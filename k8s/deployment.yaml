apiVersion: apps/v1
kind: Deployment
metadata:
  name: civ4bot
  namespace: civ4bot
  labels:
    app.kubernetes.io/name: civ4bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: civ4bot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: civ4bot
    spec:
      containers:
        - name: civ4bot
          image: civ4bot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
      volumes:
        - name: config
          configMap:
            name: civ4bot-config
